groups:
  - name: webhook-platform
    rules:
      - alert: WebhookIngestionServiceDown
        expr: up{job="app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Webhook ingestion API is down"

      - alert: WebhookDeadLetterQueueNotEmpty
        expr: webhook_queue_depth{queue="dead_letter"} > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Webhook DLQ contains messages"

      - alert: WebhookFailedEventsDetected
        expr: increase(webhook_processing_total{status="failed"}[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Webhook processing failures detected"

      - alert: WebhookSignatureFailuresDetected
        expr: increase(webhook_signature_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: info
        annotations:
          summary: "Webhook signature failures detected"
