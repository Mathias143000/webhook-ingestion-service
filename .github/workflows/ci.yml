name: webhook-receiver-ci

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: python -m ruff check app tests tools

      - name: Hardening policy check
        run: python tools/hardening_check.py

      - name: Run tests
        run: python -m pytest -q --cov=app --cov-report=term-missing

  compose-smoke:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Prepare env
        run: python tools/bootstrap_env.py

      - name: Validate compose
        run: docker compose config

      - name: Start stack
        run: docker compose up -d --build

      - name: Run smoke
        run: python tools/smoke_check.py

      - name: Collect logs on failure
        if: failure()
        run: python tools/collect_logs.py --output-dir artifacts/evidence

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: webhook-compose-evidence
          path: artifacts/evidence

      - name: Stop stack
        if: always()
        run: docker compose down -v
