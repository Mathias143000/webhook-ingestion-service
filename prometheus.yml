global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: app
    static_configs:
      - targets: ["app:8000"]

  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]
